<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <link href="https://fonts.font.im/css?family=Oleo+Script" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="avatar-section">
            <img id="avatar" class="avatar" src="white.jpg" alt="头像">
        </div>
        <div class="info-section">
            <div id="bio" class="bio"></div>
            <div id="name" class="name"></div>
            <div class="link-line" id="linkContainer"></div>
        </div>
    </div>
    <div id="overlay" class="overlay qrcode">
    </div>
    <div id="loading" class="overlay loading">
        <span id="loader" class="loader"></span>
    </div>
    <script src="script.js"></script>
</body>
</html>
